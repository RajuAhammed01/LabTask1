<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="profile-card">
        <img src="https://media.licdn.com/dms/image/v2/D5603AQElboV5emrXnQ/profile-displayphoto-crop_800_800/B56Zg4cvJnHMAc-/0/1753293715797?e=1782345600&v=beta&t=N0zYVLKgAOaLnTY7fIuuDfV34ft1D6Rfcs_KSdBXzn8" alt="Raju Ahammed's avatar" class="profile-avatar">
        
        <h1 class="profile-name">Raju Ahammed</h1>
        
        <p class="profile-bio">Machine Learning Engineer</p>
        
        <section class="profile-stats">
            <ul class="stats-list">
                <li class="stat-item">
                    <span class="stat-number">12K</span>
                    <span class="stat-label">Followers</span>
                </li>
                <li class="stat-item">
                    <span class="stat-number">450</span>
                    <span class="stat-label">Following</span>
                </li>
                <li class="stat-item">
                    <span class="stat-number">28</span>
                    <span class="stat-label">Posts</span>
                </li>
            </ul>
        </section>
        
        <button class="follow-btn">Follow</button>
    </article>
</body>
</html>
